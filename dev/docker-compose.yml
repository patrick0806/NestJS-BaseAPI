services:
  postgres:
    image: postgres:16-alpine
    container_name: referer-api-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-referer}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - referer-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-referer}
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  referer-postgres-data:
    name: referer-api-postgres-data
